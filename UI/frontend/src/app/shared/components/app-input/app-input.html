<div class="flex flex-col gap-1.5 w-full">
    @if (label()) {
    <label [attr.for]="id()" class="text-sm font-medium text-txt-secondary">{{ label() }}</label>
    }
    <input
        [id]="id()"
        [type]="type()"
        [placeholder]="placeholder()"
        [value]="value()"
        [disabled]="disabled()"
        (input)="onValueChange($event)"
        class="bg-black/20 border border-border-clean rounded-md text-txt-primary font-sans text-base px-3 py-2.5 outline-none transition-all duration-200 focus:border-brand-primary focus:ring-3 focus:ring-brand-glow disabled:opacity-50 disabled:cursor-not-allowed"
    />
</div>
