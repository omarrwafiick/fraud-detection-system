<div class="flex flex-col gap-1.5 relative w-full font-sans">
    @if (label()) { <label class="text-sm font-medium text-txt-secondary">{{ label() }}</label> }
    
    <div 
    (click)="toggleDropdown()"
    [class.opacity-50]="disabled()"
    [class.cursor-not-allowed]="disabled()"
    class="bg-black/20 border border-border-clean rounded-md text-txt-primary px-3 py-2.5 cursor-pointer flex justify-between items-center"
    >
    <span class="text-sm">
        {{ multiple() ? (getSelectedLabels() || placeholder()) : (getSingleLabel() || placeholder()) }}
    </span>
    <span class="text-xs text-txt-muted">▼</span>
    </div>

    @if (isOpen() && !disabled()) {
    <ul class="absolute top-full left-0 w-full bg-bg-surface border border-border-clean rounded-md mt-1 p-0 list-none max-h-48 overflow-y-auto z-50 shadow-2xl">
        @for (option of options(); track option.value) {
        <li 
            (click)="selectOption(option)"
            [ngClass]="{'bg-brand-glow text-brand-primary': isSelected(option)}"
            class="px-3 py-2.5 text-txt-secondary text-sm cursor-pointer flex items-center gap-2 hover:bg-bg-surface-hover hover:text-txt-primary"
        >
            @if (multiple()) {
            <input type="checkbox" [checked]="isSelected(option)" class="rounded border-border-clean bg-transparent accent-brand-primary" pointer-events-none />
            }
            {{ option.label }}
        </li>
        }
    </ul>
    }
</div>
