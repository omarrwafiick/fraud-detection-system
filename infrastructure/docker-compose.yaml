version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: fraud_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ../reverse-proxy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_challenge:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    networks:
      - fraud-network

  certbot:
    image: certbot/certbot
    container_name: certbot-client
    volumes:
      - certbot_challenge:/var/www/certbot:rw
      - certbot_certs:/etc/letsencrypt:rw
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; nginx_pid=$$(docker-compose exec nginx nginx -s reload 2>/dev/null); sleep 12h & wait $${!}; done'"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: fraud_zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - fraud-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: fraud_kafka
    restart: always
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTER_NODE:PLAINTEXT,APP_CLIENT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTER_NODE://kafka:29092,APP_CLIENT://kafka:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTER_NODE
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - fraud-network

  postgres:
    image: postgres:15-alpine
    container_name: fraud_postgres
    restart: always
    env_file:
      - ./secrets/secrets.prod.txt
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fraud-network

  redis:
    image: redis:7-alpine
    container_name: fraud_redis
    restart: always
    volumes:
      - redis_data:/var/lib/redis/data
    networks:
      - fraud-network

  neo4j:
    image: neo4j:latest
    container_name: fraud_graph_db
    restart: always
    env_file:
      - ./secrets/secrets.prod.txt
    volumes:
      - neo4j_data:/data
      - neo4j_plugins:/plugins
    networks:
      - fraud-network

networks:
  fraud-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_plugins:
  certbot_challenge:
  certbot_certs:
