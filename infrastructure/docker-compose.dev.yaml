version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: fraud_nginx_dev
    restart: always
    ports:
      - "80:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../reverse-proxy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - fraud-network

  kafka:
  image: apache/kafka:3.9.0
  container_name: fraud_kafka_dev
  hostname: kafka
  ports:
    - "9092:9092"
  environment:
    KAFKA_NODE_ID: 1
    KAFKA_CLUSTER_ID: fraud-kafka-cluster-1
    KAFKA_PROCESS_ROLES: broker,controller
    KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
    KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
    KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
    KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
    KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
    KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
    KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
  volumes:
    - kafka_dev_data:/var/lib/kafka/data

  postgres:
    image: postgres:15-alpine
    container_name: fraud_postgres_dev
    restart: always
    env_file:
      - ./secrets/secrets.dev.txt
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - fraud-network

  redis:
    image: redis:7-alpine
    container_name: fraud_redis_dev
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/var/lib/redis/data
    networks:
      - fraud-network

  neo4j:
    image: neo4j:latest
    container_name: fraud_graph_db_dev
    restart: always
    env_file:
      - ./secrets/secrets.dev.txt
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_dev_data:/data
      - neo4j_dev_plugins:/plugins
    networks:
      - fraud-network

networks:
  fraud-network:
    driver: bridge

volumes:
  postgres_dev_data:
  redis_dev_data:
  neo4j_dev_data:
  neo4j_dev_plugins:
  kafka_dev_data:
